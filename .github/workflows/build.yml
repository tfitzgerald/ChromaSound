name: Build ChromaSound

# ── Triggers ──────────────────────────────────────────────────────────────────
# No local tools needed — GitHub's cloud does 100% of the build work.
on:
  push:
    branches: [ "main", "develop" ]   # Debug APK on every push
  pull_request:
    branches: [ "main" ]              # Build check on PRs
  workflow_dispatch:                  # Manual trigger from GitHub Actions UI
  release:
    types: [ created ]                # Signed release AAB when you publish a release

permissions:
  contents: write

jobs:
  build:
    name: Build ChromaSound
    runs-on: ubuntu-latest
    # ── Use the official Gradle+JDK17 Docker image ──────────────────────────
    # This contains Java 17 and Gradle 8.6 pre-installed.
    # No wrapper jar, no local Gradle, no Android Studio needed.
    container:
      image: gradle:8.6-jdk17

    steps:

      # ── 1. Check out your source code ─────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Install Android SDK tools inside the container ─────────────────
      - name: Install Android command-line tools
        run: |
          apt-get update -qq
          apt-get install -y -qq wget unzip
          mkdir -p /opt/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip \
               -O /tmp/cmdtools.zip
          unzip -q /tmp/cmdtools.zip -d /opt/android-sdk/cmdline-tools
          mv /opt/android-sdk/cmdline-tools/cmdline-tools \
             /opt/android-sdk/cmdline-tools/latest
          echo "ANDROID_HOME=/opt/android-sdk"      >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/opt/android-sdk"  >> $GITHUB_ENV
          echo "/opt/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "/opt/android-sdk/platform-tools"           >> $GITHUB_PATH

      # ── 3. Accept SDK licenses and install required packages ───────────────
      - name: Install SDK packages (API 35 + build-tools)
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager \
            "platforms;android-35" \
            "build-tools;35.0.0"   \
            "platform-tools"

      # ── 4. Cache Gradle downloads (makes repeat builds 2–3 min faster) ─────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            /root/.gradle/caches
            /root/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: gradle-

      # ── 5. Build DEBUG APK ─────────────────────────────────────────────────
      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_HOME: /opt/android-sdk
          ANDROID_SDK_ROOT: /opt/android-sdk

      # ── 6. Upload debug APK — downloadable from the Actions tab ───────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ChromaSound-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── 7. Build SIGNED RELEASE AAB for Google Play ────────────────────────
      # Requires 4 GitHub Secrets: KEYSTORE_BASE64, KEYSTORE_PASSWORD,
      # KEY_ALIAS, KEY_PASSWORD — see README for setup instructions.
      # Only runs on release events or manual workflow_dispatch triggers.
      - name: Decode keystore from secret
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > /tmp/chromasound-upload.jks

      - name: Build Release AAB (signed)
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        run: gradle bundleRelease --no-daemon --stacktrace
        env:
          ANDROID_HOME: /opt/android-sdk
          ANDROID_SDK_ROOT: /opt/android-sdk
          KEYSTORE_PATH: /tmp/chromasound-upload.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Release AAB artifact
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ChromaSound-release-aab-${{ github.sha }}
          path: app/build/outputs/bundle/release/app-release.aab
          retention-days: 90

      # ── 8. Attach signed AAB to the GitHub Release page ───────────────────
      - name: Attach AAB to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/bundle/release/app-release.aab
          token: ${{ secrets.GITHUB_TOKEN }}
